<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk Chấm Công - Nhận Diện</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgba(18,36,51,0.55) 0%, rgba(22,94,86,0.55) 100%);
            min-height: 100vh; display:flex; align-items:center; justify-content:center; color:#fff;
        }
        .wrap { width: 92%; max-width: 820px; background: rgba(15,23,42,0.22); border-radius: 20px; padding: 28px 24px; backdrop-filter: blur(10px); border:1px solid rgba(255,255,255,0.06); box-shadow: 0 8px 32px rgba(15,23,42,0.18); }
        h1 { font-size: 28px; font-weight: 700; letter-spacing: .3px; }
        .sub { opacity:.85; margin-top: 4px; font-size: 14px; }
        .row { display:flex; gap:16px; flex-wrap:wrap; align-items:flex-start; margin-top:16px; }
        video, canvas { width: 320px; height: 240px; background:#020617; border-radius: 12px; border: 1px solid rgba(255,255,255,0.14); }
        video { transform: scaleX(-1); }
        .side { flex:1; min-width: 220px; }
        .controls { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
        .btn { display:inline-block; padding: 12px 20px; border-radius: 999px; text-decoration: none; font-size: 14px; font-weight: 600; transition: all 0.18s ease; border: 2px solid rgba(255,255,255,0.12); cursor: pointer; color: #fff; background: rgba(255,255,255,0.06); }
        .btn:hover { background: rgba(255,255,255,0.09); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
        .btn-primary { background: rgba(255,255,255,0.06); color: white; border: 2px solid rgba(255,255,255,0.12); }
        .btn-primary:hover { background: rgba(255,255,255,0.10); }
        .status { margin-top: 12px; font-size: 14px; min-height: 22px; }
        .tips { margin-top: 12px; font-size: 13px; opacity:.9; }
        .auto-badge { display:inline-flex; align-items:center; gap:8px; margin-top:12px; padding:8px 12px; border-radius:999px; background: rgba(20,184,166,0.16); font-size: 13px; border:1px solid rgba(255,255,255,0.12); }
        .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; }
        a.link { color:#ccfbf1; opacity:.95; text-decoration: none; border-bottom:1px dashed rgba(204,251,241,0.55); }
    </style>
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <div>
                <h1>Kiosk Chấm Công</h1>
            </div>
            <div style="display:flex; gap:14px; align-items:center; flex-wrap:wrap;">
                <div id="clock" style="font-size:14px; opacity:0.9;"></div>
                <a href="{{ url_for('auth.logout') }}" class="link">Đăng xuất</a>
            </div>
        </div>
        <div class="row">
            <div>
                <video id="video" autoplay playsinline muted></video>
                <canvas id="canvas" width="320" height="240" style="display:none"></canvas>
            </div>
            <div class="side">
                <div class="controls">
                    <button class="btn" id="btnStart">Bật camera</button>
                    <button class="btn" id="btnStop">Tắt camera</button>
                </div>
                <div class="controls">
                    <button class="btn" id="btnIn">Check-in</button>
                    <button class="btn" id="btnOut">Check-out</button>
                </div>
                <div class="auto-badge">🤖 Tự động nhận diện đang bật</div>
                <div id="status" class="status"></div>
                <div class="tips">
                    - Căn khuôn mặt vào trung tâm khung hình.<br/>
                    - Hệ thống sẽ tự nhận diện và chấm công cho đúng nhân viên.<br/>
                    - Sau mỗi lượt thành công, hệ thống sẽ nghỉ ngắn trước khi quét tiếp.
                </div>
            </div>
        </div>
    </div>

<script>
let stream;
let processing = false;
let autoPauseUntil = 0;
let autoTimer = null;
const qs = (s) => document.querySelector(s);
const video = qs('#video');
const canvas = qs('#canvas');
const statusEl = qs('#status');

async function startCamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } }, audio: false });
        video.srcObject = stream;
        statusEl.textContent = '📷 Camera đã bật.';
        startAutoRecognition();
    } catch (e) {
        statusEl.textContent = '❌ Không truy cập được camera. Kiểm tra quyền trong trình duyệt.';
    }
}

function stopCamera() {
    if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
        video.srcObject = null;
        statusEl.textContent = '🛑 Camera đã tắt.';
    }
}

function captureDataURL() {
    const ctx = canvas.getContext('2d');
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
    ctx.restore();
    return canvas.toDataURL('image/jpeg', 0.7);
}

const AUTO_RECOGNITION_INTERVAL_MS = 900;
const AUTO_RECOGNITION_SUCCESS_PAUSE_MS = 10000;

function startAutoRecognition() {
    if (autoTimer) return;

    autoTimer = setInterval(() => {
        if (!stream || processing || Date.now() < autoPauseUntil) return;
        recognizeThen('auto', true);
    }, AUTO_RECOGNITION_INTERVAL_MS);
}

function pauseAutoRecognition(ms = AUTO_RECOGNITION_SUCCESS_PAUSE_MS) {
    autoPauseUntil = Date.now() + ms;
}

function updateClock() {
    const clockEl = document.getElementById('clock');
    const now = new Date();
    const formatted = now.toLocaleTimeString('vi-VN', { hour12: false });
    const formattedDate = now.toLocaleDateString('vi-VN');
    clockEl.textContent = `${formattedDate} ${formatted}`;
}

async function recognizeThen(action, autoTriggered = false) {
    if (!stream || processing) return;

    processing = true;
    if (!autoTriggered) {
        statusEl.textContent = '⏳ Đang nhận diện...';
    }
    try {
        const image = captureDataURL();
        const recRes = await fetch('/api/face/recognize', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image })
        });
        const recData = await recRes.json();
        if (!recRes.ok || !recData.success || !recData.employee_code) {
            if (!autoTriggered) {
                statusEl.textContent = `❌ Không nhận diện được: ${recData.message || 'Unknown'}`;
            }
            return;
        }
        const employee_code = recData.employee_code;
        const employee_name = recData.employee_name || employee_code;
        statusEl.textContent = `✅ Nhận diện: ${employee_name}. Đang ghi chấm công...`;

        // Send photo along with employee_code
        const attRes = await fetch(`/kiosk/${action}`, {
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ 
                employee_code: employee_code,
                photo_path: image  // Send base64 image as photo_path
            })
        });
        const attData = await attRes.json();
        if (!attRes.ok) {
            statusEl.textContent = `❌ ${attData.message || 'Ghi chấm công thất bại'}`;
        } else {
            statusEl.textContent = `✅ ${attData.message} (NV: ${employee_name})`;
            pauseAutoRecognition(10000);
        }
    } catch (e) {
        statusEl.textContent = '❌ Lỗi kết nối đến máy chủ.';
    } finally {
        processing = false;
    }
}

qs('#btnStart').addEventListener('click', startCamera);
qs('#btnStop').addEventListener('click', stopCamera);
qs('#btnIn').addEventListener('click', () => recognizeThen('check-in'));
qs('#btnOut').addEventListener('click', () => recognizeThen('check-out'));

window.addEventListener('load', () => {
    updateClock();
    setInterval(updateClock, 1000);
    startCamera();
});

window.addEventListener('beforeunload', () => {
    if (autoTimer) {
        clearInterval(autoTimer);
        autoTimer = null;
    }
    stopCamera();
});
</script>
</body>
</html>
